<style>
  :root{
    --bg:#F6F8F3; --panel:#FFFFFF; --forest:#1B4B3A; --forest-deep:#133328;
    --sage:#6B9080; --gold:#C99A3D; --rust:#B33A1E; --rust-soft:#E7CEC5;
    --ink:#1F2A22; --ink-soft:#55645A; --line:#DCE3D8; --pill:#EFF4EC;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}
  ::selection{background:var(--gold); color:var(--forest-deep);}
  :focus-visible{outline:2px solid var(--forest); outline-offset:2px;}
  .wrap{max-width:1080px; margin:0 auto; padding:26px 18px 60px;}

  header.app{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:28px; flex-wrap:wrap;}
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-text h1{font-family:'Fraunces',serif; font-weight:600; font-size:21px; margin:0; color:var(--forest-deep);}
  .brand-text p{margin:2px 0 0; font-size:12px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
  .badge{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--forest); background:#E7EFE7; border:1px solid var(--line); padding:6px 12px; border-radius:100px; white-space:nowrap;}

  .kb-strip{display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap;}
  .kb-pill{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:10px 16px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); display:flex; align-items:center; gap:8px;}
  .kb-pill b{color:var(--forest-deep); font-size:16px;}

  .scanner{background:var(--panel); border:1px solid var(--line); border-radius:22px; padding:24px; max-width:520px; margin:0 auto 8px;}
  .scanner-title{font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--sage); margin:0 0 14px; text-align:center;}
  .leaf-frame{position:relative; width:100%; max-width:300px; aspect-ratio:1/1; margin:0 auto;
    clip-path: path('M150,4 C238,4 296,62 296,148 C296,234 231,296 150,296 C69,296 4,236 4,150 C4,71 62,4 150,4 Z');
    background:#EEF3EB; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; overflow:hidden; cursor:pointer;}
  .leaf-frame.has-image{border-color:var(--sage);}
  .leaf-frame img{width:100%; height:100%; object-fit:cover;}
  .leaf-frame .placeholder{display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--sage); padding:18px; text-align:center;}
  .leaf-frame .placeholder span{font-size:12.5px; font-weight:500; color:var(--ink-soft); max-width:190px;}
  .scan-line{position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent);
    box-shadow:0 0 12px 2px rgba(201,154,61,.7); animation:scan 1.6s linear infinite; display:none;}
  .leaf-frame.scanning .scan-line{display:block;}
  @keyframes scan{0%{top:6%;} 50%{top:90%;} 100%{top:6%;}}
  @media (prefers-reduced-motion:reduce){ .scan-line{animation:none; top:50%;} }
  input[type=file]{display:none;}
  .actions{display:flex; gap:10px; justify-content:center; margin-top:18px; flex-wrap:wrap;}
  button{font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px; border-radius:10px; border:none; padding:11px 18px; cursor:pointer; transition:transform .12s ease, background .15s ease;}

  .block p{font-size:13.5px; line-height:1.6; color:var(--ink-soft); margin:0;}
  ul.checklist{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px;}
  ul.checklist li{display:flex; gap:9px; font-size:13.5px; line-height:1.5; color:var(--ink);}
  ul.checklist li .ico{color:var(--forest); flex-shrink:0; margin-top:1px;}

  .dorilar h4{font-family:'Fraunces',serif; font-size:17px; font-weight:600; margin:0 0 4px; color:var(--forest-deep);}
  .dorilar .sub{font-size:12px; color:var(--ink-soft); margin:0 0 14px;}
  .dori-card{background:var(--pill); border:1px solid var(--line); border-radius:12px; padding:13px 16px; margin-bottom:10px;}
  .dori-card .dname{font-weight:700; color:var(--forest-deep); font-size:13.8px; margin-bottom:3px;}
  .dori-card .dinfo{font-size:12.8px; color:var(--ink-soft); line-height:1.5;}
  .no-chem{background:#EFF4EC; border:1px dashed var(--sage); border-radius:12px; padding:14px 16px; font-size:13px; color:var(--ink-soft);}

  .safety-box{margin-top:20px; background:#FCEDE9; border:1px solid var(--rust-soft); border-radius:12px; padding:14px 16px; font-size:12.5px; color:var(--rust); line-height:1.55;}
  .error-box{margin-top:18px; background:#FCEDE9; border:1px solid var(--rust-soft); color:var(--rust); padding:14px 16px; border-radius:12px; font-size:13.5px; text-align:center;}

<body>
<div class="wrap">
  <header class="app">
    <div class="brand">
      <svg width="38" height="38" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="20" fill="#1B4B3A"/>
        <path d="M20 29C15 26 11 21.5 11 16.8C11 13.6 13.6 11 16.8 11C18.2 11 19.4 11.7 20 12.8C20.6 11.7 21.8 11 23.2 11C26.4 11 29 13.6 29 16.8C29 21.5 25 26 20 29Z" fill="#8FC79A"/>
        <path d="M20 13V29" stroke="#1B4B3A" stroke-width="1.2"/>
      </svg>
      <div class="brand-text">
        <h1>Yordamchi Agronom AI</h1>
        <p>TASHXIS · DAVOLASH · DORI TAVSIYASI</p>
      </div>
    </div>
    <span class="badge">v2 · Bilimlar bazasiga ulangan</span>
  </header>

  <div class="scanner">
    <p class="scanner-title">Barg / poya / meva suratini yuklang</p>
    <div class="leaf-frame" id="leafFrame">
      <div class="scan-line" id="scanLine"></div>
      <div class="placeholder" id="placeholder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6B9080" stroke-width="1.6"><path d="M12 21C7 18 3 14 3 9.5A5.5 5.5 0 0 1 12 5.8A5.5 5.5 0 0 1 21 9.5C21 14 17 18 12 21Z"/></svg>
        <span>Kasallangan barg, meva yoki tana suratini yuklang</span>
      </div>
      <img id="preview" style="display:none;" alt="Yuklangan surat">
    </div>
    <input type="file" id="fileInput" accept="image/*">
    <div class="actions">
      <button class="btn-ghost" id="chooseBtn" type="button">Rasm tanlash</button>
      <button class="btn-primary" id="analyzeBtn" type="button" disabled>Tashxis qo'yish</button>
    </div>
    <div class="status-line" id="statusLine"></div>
  </div>

  <div id="reportHolder"></div>

  <footer class="note">Yordamchi Agronom AI · Demo prototip — yakuniy qaror uchun mahalliy agronom bilan maslahatlashing</footer>
</div>

<script>
let KB_DISEASES = [];
let KB_PESTS = [];

async function loadKB(){
  try {
    const res = await fetch('/data/kb.json');
    const data = await res.json();
    KB_DISEASES = data.diseases;
    KB_PESTS = data.pests;
  } catch (e) {
    console.error('Bilimlar bazasini yuklashda xatolik:', e);
  }
}
loadKB();

const fileInput = document.getElementById('fileInput');
const chooseBtn = document.getElementById('chooseBtn');
const analyzeBtn = document.getElementById('analyzeBtn');
const leafFrame = document.getElementById('leafFrame');
const preview = document.getElementById('preview');
const placeholder = document.getElementById('placeholder');
const statusLine = document.getElementById('statusLine');
const reportHolder = document.getElementById('reportHolder');

let currentBase64 = null, currentMediaType = null;

chooseBtn.addEventListener('click', () => fileInput.click());
leafFrame.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  currentMediaType = file.type;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    currentBase64 = dataUrl.split(',')[1];
    preview.src = dataUrl;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    leafFrame.classList.add('has-image');
    analyzeBtn.disabled = false;
    statusLine.textContent = '';
    reportHolder.innerHTML = '';
  };
  reader.readAsDataURL(file);
});

// ---- Dorilar (davolash vositalari) — turi bo'yicha umumiy, O'zbekiston agrodo'konlarida keng tarqalgan vositalar ----
const DORI_ZAMBURUG = [
  {n:"Bordo suyuqligi (mis kuporosi + ohak)", i:"Keng ta'sirli, profilaktik hamda bahor-kuzgi ishlov uchun; qadoqdagi yo'riqnomaga qat'iy amal qiling"},
  {n:"Mis xlorokisi (ХОМ)", i:"Ko'plab zamburug' va bakterial kasalliklarga qarshi qo'llaniladigan mis asosidagi vosita"},
 {n:"Sistemali fungitsid (masalan, Ridomil Gold MC, Skor yoki Topaz turkumidagi vositalar)", i:"Kuchliroq zararlanishda qo'llaniladi; agrodo'kondan mavjudini so'rab, yorliqdagi me'yorga rioya qiling"},
  {n:"Kollid oltingugurt / oltingugurt asosidagi preparat", i:"Ayniqsa un shudringga qarshi samarali, past zaharlilikka ega"},
];
const DORI_BAKTERIYA = [
  {n:"Mis xlorokisi (ХОМ) yoki Bordo suyuqligi", i:"Bakterial kasalliklarga qarshi asosiy vosita, zararlanish boshlanishi bilan qo'llanadi"},
  {n:"Mis asosidagi boshqa preparat (masalan, Kuprosan turkumi)", i:"Gullashdan oldin profilaktik maqsadda ham ishlatiladi"},
];
const DORI_HASHAROT = [
  {n:"Sistemali insektitsid (masalan, Aktara turkumidagi vositalar)", i:"Shira va boshqa so'ruvchi hasharotlarga qarshi keng qo'llaniladi"},
  {n:"Kontakt ta'sirli insektitsid (masalan, Fufanon yoki Karbofos turkumi)", i:"Ko'p turdagi hasharotlarga qarshi, gullash davrida ehtiyotkorlik bilan qo'llang"},
  {n:"Piretroid guruhidagi vosita (masalan, Detsis turkumi)", i:"Kapalak qurtlari va boshqa kemiruvchi hasharotlarga qarshi samarali"},
];
const DORI_KANA = [
  {n:"Maxsus akaritsid (masalan, Nissoran yoki Omayt turkumidagi vositalar)", i:"O'rgimchakkana va boshqa kanalarga qarshi maxsus ishlab chiqilgan"},
];
const DORI_VIRUS_NOTE = "Virusli kasalliklarga qarshi to'g'ridan-to'g'ri davolovchi dori-darmon mavjud emas. Asosiy chora: kasallangan qismlarni yo'q qilish, sog'lom ko'chat/urug'lik ishlatish va virusni tarqatuvchi hasharotlarga (shira, trips) qarshi kurash.";
const DORI_FIZIOLOGIK_NOTE = "Bu holat kasallik emas, balki parvarish sharoiti (sug'orish, oziqlanish) bilan bog'liq. Kimyoviy dori talab qilinmaydi — sug'orish tartibini va o'g'itlashni tekshiring.";

function getDorilar(turi){
  const t = (turi || '').toLowerCase();
  if (t.includes('zararkunanda')){
    return {list: DORI_HASHAROT, note:null, altList: DORI_KANA, altLabel:"Agar zararkunanda kana turiga oid bo'lsa:"};
  }
  if (t.includes('virus')) return {list: [], note: DORI_VIRUS_NOTE};
  if (t.includes('fiziolog')) return {list: [], note: DORI_FIZIOLOGIK_NOTE};
  if (t.includes('bakteriya')) return {list: DORI_BAKTERIYA, note:null};
  return {list: DORI_ZAMBURUG, note:null}; // default: zamburug'
}

function findInKB(ekin, nomi){
  if (!nomi) return null;
  const normN = nomi.toLowerCase().trim();
  const normE = (ekin||'').toLowerCase().trim();
  let best = null;
  for (const d of KB_DISEASES){
    const dn = (d.nomi||'').toLowerCase();
    if (dn === normN  dn.includes(normN)  normN.includes(dn)){
      if ((d.ekin'').toLowerCase().includes(normE)  normE.includes((d.ekin'').toLowerCase())  !normE){
        return d;
      }
      best = best || d;
    }
  }
  for (const p of KB_PESTS){
    const pn = (p.nomi||'').toLowerCase();
    if (pn === normN  pn.includes(normN)  normN.includes(pn)){
      return {ekin: p.ekinlar, nomi: p.nomi, qozgatuvchi: p.ilmiy, turi: "Zararkunanda", alomat: p.belgi, uzb: p.uzb, chora: p.chora};
    }
  }
  return best;
}

function severityInfo(level){
  const map = {
    'past': {pct:25, color:'#3E7A4F', bg:'#E3F0E5', label:'Past darajadagi zararlanish'},
    'orta': {pct:60, color:'#B07A22', bg:'#F5EAD3', label:"O'rtacha darajadagi zararlanish"},
    'yuqori': {pct:92, color:'#B33A1E', bg:'#F6DCD5', label:'Yuqori darajadagi zararlanish'}
  };
  return map[level] || map['orta'];
}

function renderDoriCards(list){
  return list.map(d => <div class="dori-card"><div class="dname">${d.n}</div><div class="dinfo">${d.i}</div></div>).join('');
}

function renderReport(aiResult){
  const isHealthy = aiResult.holat === 'soglom';
  const isUnknown = aiResult.holat === 'nomalum';
  const matched = !isHealthy && !isUnknown ? findInKB(aiResult.ekin, aiResult.nomi) : null;

  const nomi = matched ? matched.nomi : (aiResult.nomi || "Aniqlanmadi");
[23.07.2026 2:06] GʻAFUR URAKOV: const ekin = matched ? matched.ekin : (aiResult.ekin || "");
  const turi = matched ? matched.turi : (aiResult.turi || "");
  const alomat = matched ? matched.alomat : (aiResult.tavsif || "—");
  const chora = matched ? matched.chora : (aiResult.tavsif_chora || "Aniq tavsiya uchun mahalliy agronomga murojaat qiling");
  const uzbNote = matched ? matched.uzb : null;
  const sev = severityInfo(aiResult.daraja);

  let dorilarHtml = '';
  if (!isHealthy && !isUnknown){
    const d = getDorilar(turi);
    if (d.note){
      dorilarHtml = <div class="no-chem">${d.note}</div>;
    } else {
      dorilarHtml = renderDoriCards(d.list);
      if (d.altList){
        dorilarHtml += <p class="sub" style="margin-top:10px;">${d.altLabel}</p> + renderDoriCards(d.altList);
      }
    }
  }

  reportHolder.innerHTML = 
    <div class="report">
      <div class="report-top">
        <div>
          <p class="eyebrow">${isHealthy ? "Natija" : isUnknown ? "Noaniq holat" : "Aniqlangan holat"}</p>
          <h3>${nomi}</h3>
          ${ekin ? <p class="crop-tag">Ekin: ${ekin}</p> : ''}
        </div>
        <div class="confidence">ISHONCH DARAJASI<b>${aiResult.ishonch ?? '—'}%</b></div>
      </div>

      ${!isHealthy && !isUnknown ? 
      <div class="severity">
        <div class="label">Zararlanish darajasi</div>
        <div class="severity-track"><div class="severity-fill" style="width:${sev.pct}%"></div></div>
        <span class="severity-tag" style="background:${sev.bg}; color:${sev.color}">${sev.label}</span>
      </div> : ''}

      ${uzbNote ? <div class="uzb-note"><span class="ico">📍</span><span>${uzbNote}</span></div> : ''}

      <div class="grid-2">
        <div class="block">
          <h4>Alomatlari</h4>
          <p>${alomat}</p>
        </div>
        <div class="block">
          <h4>${isHealthy ? "Tavsiyalar" : "Kurash va profilaktika"}</h4>
          <p>${chora}</p>
        </div>
      </div>

      ${!isHealthy && !isUnknown ? 
      <div class="dorilar">
        <h4>Tavsiya etiladigan dorilar</h4>
        <p class="sub">O'zbekiston agrodo'kon/agrokimyo do'konlarida keng tarqalgan vositalar turkumi</p>
        ${dorilarHtml}
      </div>
      <div class="safety-box">
        ⚠️ Bu tavsiyalar umumiy yo'nalish beradi. Aniq doza va qo'llash tartibi mahsulot yorlig'ida ko'rsatiladi — iltimos, sotib olishdan oldin agrodo'kon mutaxassisi yoki agronom bilan maslahatlashing va yorliqdagi ko'rsatmaga qat'iy rioya qiling. Bolalar va hayvonlardan uzoqda saqlang.
      </div> : ''}
    </div>
  ;
}

analyzeBtn.addEventListener('click', async () => {
  if (!currentBase64) return;
  analyzeBtn.disabled = true; chooseBtn.disabled = true;
  leafFrame.classList.add('scanning');
  reportHolder.innerHTML = '';

  const messages = ['tahlil qilinmoqda', 'bazadagi ma\'lumotlar bilan solishtirilmoqda', 'eng mos tashxis izlanmoqda', 'davolash tavsiyasi tayyorlanmoqda'];
  let i = 0;
  statusLine.textContent = messages[0] + ' …';
  const statusTimer = setInterval(() => { i = (i+1) % messages.length; statusLine.textContent = messages[i] + ' …'; }, 1400);

  try {
    const response = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        base64: currentBase64,
        mediaType: currentMediaType || "image/jpeg"
      })
    });

    const parsed = await response.json();
    if (!response.ok) {
      throw new Error(parsed.error || 'Server xatoligi');
    }
    renderReport(parsed);
    statusLine.textContent = 'Tahlil yakunlandi ✓';
  } catch (err){
    console.error(err);
    reportHolder.innerHTML = <div class="error-box">Tahlil amalga oshmadi. Iltimos qaytadan urinib ko'ring yoki boshqa rasm tanlang.</div>;
    statusLine.textContent = '';
  } finally {
    clearInterval(statusTimer);
    leafFrame.classList.remove('scanning');
    analyzeBtn.disabled = false; chooseBtn.disabled = false;
  }
});
</script>
</body>
</html>
